<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form style="border: 1px solid black; padding-left: 10px; width: 460px;">
        <h2>Данные студента</h2>
        <table>
            <tr>
                <td align="right">Имя студента</td>
                <td><input type="text" name="form_student" id="" style="width: 220px;"></td>
            </tr>
            <tr>
                <td align="right">Отчкство студента</td>
                <td><input type="text" name="form_student" id="" style="width: 220px;"></td>
            </tr>
            <tr>
                <td align="right">Фамилия студента</td>
                <td><input type="text" name="form_student" id="" style="width: 220px;"></td>
            </tr>
            <tr>
                <td align="right">Адрес почты</td>
                <td><input type="email" name="form_student" id="" style="width: 220px;"></td>
            </tr>
            <tr>
                <td align="right">Контактный номер</td>
                <td><input type="tel" name="form_student" id="" style="width: 220px;"></td>
            </tr>
            <tr>
                <td align="right" style="word-break: normal; width: 200px;">Какую социальную сеть вы используете</td>
                <td>
                    <input type="checkbox" name="form_student" id=""> VK
                    <input type="checkbox" name="form_student" id=""> Facebook
                    <input type="checkbox" name="form_student" id=""> Instagram
                </td>
            </tr>
        </table>
        <input type="button" value="Отправить" name="form_student" style="margin: 20px 0 10px 0;">
    </form>
</body>
</html>
