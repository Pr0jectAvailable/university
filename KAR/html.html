<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анимация раскладывания</title>
<link rel="stylesheet" href="style.css">
<style>
    body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}

.container {
  position: relative;
  width: 900px;
  height: 300px;
}

.pic {
  position: absolute;
  width: 200px;
  height: 300px;
  border: 2px solid black;
  writing-mode: vertical-rl;
  text-orientation: upright;
  background: white;
  animation: move 5s ease-in-out infinite alternate;
}

/* Небольшой наклон в начале – как "стопка" */
.p1 { transform: rotate(-5deg); }
.p2 { transform: rotate(-3deg); }
.p3 { transform: rotate(-1deg); }
.p4 { transform: rotate(1deg); }

/* стартовая позиция - стопка */
.p1 { left: 0; animation-delay: 0s; }
.p2 { left: 0; animation-delay: 0.1s; }
.p3 { left: 0; animation-delay: 0.2s; }
.p4 { left: 0; animation-delay: 0.3s; }

@keyframes move {
  0%   { left: 0px; }
  50%  { left: 50px; }
  100% { left: 250px; }
}

</style>
</head>
<body>

<div class="container">
  <div class="pic p1">Изображение 1</div>
  <div class="pic p2">Изображение 2</div>
  <div class="pic p3">Изображение 3</div>
  <div class="pic p4">Изображение 4</div>
</div>

</body>
</html>
