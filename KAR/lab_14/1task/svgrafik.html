<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="620" height="200">
        <path id="text-path" d="M 50 50 c 80 90 380 -60 560 10" stroke="black" stroke-width="8" fill="none"/>

        <text font-family="Arial" font-size="36" fill="red" dy="-10">
            <textPath href="#text-path">
                Текст вдоль произвольной кривой
            </textPath>
        </text>
    </svg>
    <div class="container">
        <div class="figures">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="70" fill="blue"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <rect y="50" width="200" height="120" fill="red"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <ellipse cx="100" cy="100" rx="100" ry="60" fill="green"/>>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <polygon points="100 30 180 160 20 160" fill="yellow"/>
            </svg>
        </div>
        <svg class="line" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
            <polyline iewBox="4300 4600 500 500" points="10 10 400 10 340 90 790 90" stroke="#410141" stroke-width="3" fill="none"/>
        </svg>
        <svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <path 
                d="M 280 50 C 280 50 140 230 142 230 C 140 230 240 230 240 230 C 240 230 90 410 90 410 C 90 410 240 410 240 410 C 240 410 240 530 240 530 C 240 530 340 530 340 530 C 340 530 340 410 340 410 C 340 410 540 410 540 410 C 540 410 340 230 340 230 C 340 230 490 230 490 230 C 490 230 280 50 280 50"
                fill="none" stroke="black" stroke-width="3">
            </path>

            <path class="star" d="M280,10 L290,43 L320,43 L300,63 L310,93 L280,73 L250,93 L260,63 L240,43 L270,43 Z" 
                fill="#ffd700" stroke="#ff9900" stroke-width="1">
            </path>

            <path class="star" d="M140,200 L150,233 L180,233 L160,253 L170,283 L140,263 L110,283 L120,253 L100,233 L130,233 Z" 
                fill="#ff6b6b" stroke="#ff4757" stroke-width="1.5">
                <animate attributeName="stroke" 
                values="gold;red;purple" 
                dur="1s" 
                repeatCount="indefinite"/>
            </path>

            <path class="star" d="M440,200 L450,233 L480,233 L460,253 L470,283 L440,263 L410,283 L420,253 L400,233 L430,233 Z" 
                fill="#4ecdc4" stroke="#00cec9" stroke-width="1.5">
                <animate attributeName="fill" 
                values="blue;red;purple;gold;blue" 
                dur="2s" 
                repeatCount="indefinite"/>
            </path>

            <path class="star" d="M90,380 L100,413 L130,413 L110,433 L120,463 L90,443 L60,463 L70,433 L50,413 L80,413 Z" 
                fill="#a29bfe" stroke="#6c5ce7" stroke-width="1.5">
                <animate 
                attributeName="fill" 
                values="blue;green;purple;gold" 
                dur="4s" 
                repeatCount="indefinite"/>
            </path>

            <path class="star" d="M440,380 L450,413 L480,413 L460,433 L470,463 L440,443 L410,463 L420,433 L400,413 L430,413 Z" 
            fill="#55efc4" stroke="#00b894" stroke-width="1.5">
                <animate 
                attributeName="fill" 
                values="gold;red;blue;green;purple;gold" 
                dur="4s" 
                repeatCount="indefinite"/>
                <animate attributeName="stroke" 
                values="blue;red;purple;gold;blue" 
                dur="4s" 
                repeatCount="indefinite"/>
            </path>
        </svg>
        </div>
</body>
</html>
